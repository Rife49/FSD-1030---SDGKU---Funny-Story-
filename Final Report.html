<h1>Temperature Dashboard</h1>

<h2>Convert a Temperature</h2>

<button onclick="convertCtoF()">Celsius ➜ Fahrenheit</button>

<div id="thermometer">
    <div id="fill"></div>
</div>


<p id="result"></p>

<hr>

<table>
<thead>
<tr>
<th>Celsius (°C)</th>
<th>Fahrenheit (°F)</th>
</tr>
</thead>

<tbody id="tableBody">

</tbody>
</table>
